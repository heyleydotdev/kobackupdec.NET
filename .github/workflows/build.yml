name: Build C# Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019 # Uses a runner with legacy .NET Framework support built-in

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore kobackupdec.NET.sln

    - name: Build Solution
      run: msbuild kobackupdec.NET.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Built Executable
      uses: actions/upload-artifact@v4
      with:
        name: kobackupdec-windows
        path: |
          **/bin/Release/kobackupdec.exe
          **/bin/Release/*.dll
