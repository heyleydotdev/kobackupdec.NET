name: Build C# Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger via GitHub button

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' # Adjust version if the repo uses an older/newer runtime

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Self-Contained Executable
      run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ./publish

    - name: Upload Built Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kobackupdec-windows-x64
        path: ./publish/kobackupdec.exe
